server:
  http_listen_port: 9080
  grpc_listen_port: 0

# Промежуточное хранилище позиций чтения — переживает рестарт самого
# promtail (не путать с данными в Loki, они в отдельном volume lokidata).
positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Docker service discovery: находит ВСЕ контейнеры на хосте (не только
  # из этого docker-compose проекта) через сокет Docker и читает их
  # json-file логи напрямую с диска — то же самое, что видит `docker logs`.
  # Ни один сервис не настраивается индивидуально: подключить логирование
  # нового сервиса = просто добавить его в docker-compose, отдельного шага
  # "научить сервис отправлять логи" не требуется в принципе.
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Имя compose-сервиса (api-server, nx-worker-stub, ...) — по нему
      # потом фильтруются логи в Grafana.
      - source_labels: ["__meta_docker_container_label_com_docker_compose_service"]
        target_label: "service"
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(.*)"
        target_label: "container"
      - source_labels: ["__meta_docker_container_log_stream"]
        target_label: "stream"
