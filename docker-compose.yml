name: simensnx

# ВНИМАНИЕ: это окружение для локальной разработки, НЕ прод-топология.
# В проде: PostgreSQL — HA (Patroni/CloudNativePG), RabbitMQ — 3-нодовый
# кластер через Cluster Operator в Kubernetes (см. deploy/helm и ARCHITECTURE.md).

services:

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-simensnx}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-simensnx}
      POSTGRES_DB: ${POSTGRES_DB:-simensnx}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-simensnx}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3.13-management
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-simensnx}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-simensnx}
      RABBITMQ_LOAD_DEFINITIONS: "/etc/rabbitmq/definitions.json"
    volumes:
      - ./deploy/rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
      - rabbitmqdata:/var/lib/rabbitmq
    ports:
      - "5672:5672"   # AMQP
      - "15672:15672" # management UI
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  auth-stub:
    build: ./services/auth-stub
    environment:
      PORT: "8081"
    restart: unless-stopped

  license-server-stub:
    build: ./services/license-server-stub
    environment:
      PORT: "8083"
    restart: unless-stopped

  file-storage-service:
    build: ./services/file-storage-service
    environment:
      PORT: "8084"
    volumes:
      - filestorage:/data
    restart: unless-stopped

  job-orchestrator:
    build: ./services/job-orchestrator
    environment:
      PORT: "8082"
      DATABASE_URL: postgres://${POSTGRES_USER:-simensnx}:${POSTGRES_PASSWORD:-simensnx}@postgres:5432/${POSTGRES_DB:-simensnx}
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-simensnx}:${RABBITMQ_PASSWORD:-simensnx}@rabbitmq:5672/
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  api-server:
    build: ./services/api-server
    environment:
      PORT: "8080"
      DATABASE_URL: postgres://${POSTGRES_USER:-simensnx}:${POSTGRES_PASSWORD:-simensnx}@postgres:5432/${POSTGRES_DB:-simensnx}
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-simensnx}:${RABBITMQ_PASSWORD:-simensnx}@rabbitmq:5672/
      AUTH_SERVICE_URL: http://auth-stub:8081
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      auth-stub:
        condition: service_started
    restart: unless-stopped

  # Локальная линуксовая заглушка для проверки протокола.
  # Реальный воркер — Windows, вне docker-compose/k8s. См. services/nx-worker-stub/README.md
  nx-worker-stub:
    build: ./services/nx-worker-stub
    environment:
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-simensnx}:${RABBITMQ_PASSWORD:-simensnx}@rabbitmq:5672/
      FILE_STORAGE_URL: http://file-storage-service:8084
      LICENSE_SERVER_URL: http://license-server-stub:8083
    depends_on:
      rabbitmq:
        condition: service_healthy
      file-storage-service:
        condition: service_started
      license-server-stub:
        condition: service_started
    restart: unless-stopped

  # --- Логирование: каждый сервис пишет только в свой stdout (уже так и
  # есть, через qInfo()/qWarning()) — забирает и агрегирует логи Promtail,
  # push-модель через отдельный log-collector-stub сознательно не используется
  # (см. docs/adr/0003-logging-pull-not-push.md).
  loki:
    image: grafana/loki:2.9.8
    ports:
      - "3100:3100"
    volumes:
      - lokidata:/loki
    restart: unless-stopped

  promtail:
    image: grafana/promtail:2.9.8
    volumes:
      - ./deploy/observability/promtail-config.yaml:/etc/promtail/config.yaml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yaml
    depends_on:
      - loki
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.1.0
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
    volumes:
      - ./deploy/observability/grafana-datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml:ro
      - grafanadata:/var/lib/grafana
    depends_on:
      - loki
    restart: unless-stopped

volumes:
  pgdata:
  filestorage:
  rabbitmqdata:
  lokidata:
  grafanadata:
